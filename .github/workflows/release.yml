name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches-ignore: []

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches manifest version
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          TAG="${TAG#v}"
          MANIFEST_VERSION=$(python -c "import json; print(json.load(open('custom_components/crystal_water_monitor/manifest.json'))['version'])")
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "Tag $TAG does not match manifest version $MANIFEST_VERSION"
            exit 1
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.workflow_run.head_branch }}
          generate_release_notes: true
